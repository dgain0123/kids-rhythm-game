<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>幼兒節奏遊戲</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <canvas id="fxCanvas"></canvas>
  <div id="winBanner" hidden>🎉 太棒了！🎉</div>
  <div id="app">
    <h1 id="title">幼兒節奏遊戲</h1>
    <p id="hint">看到音符，打1下鼓！</p>

    <div id="charPicker" class="char-picker"></div>

    <div id="stage" class="stage">
      <canvas id="noteCanvas" width="560" height="160"></canvas>
      <div id="face"></div>
      <div id="status">按「開始遊戲」，然後打1下鼓</div>
      <div class="meter">
        <div id="meterFill"></div>
        <div id="threshMark" title="打鼓超過這條線就會觸發"></div>
      </div>
    </div>

    <div class="controls">
      <div class="sens-row">
        <span>不靈敏</span>
        <input id="sensitivity" type="range" min="0" max="1" step="0.01" value="0.7" />
        <span>很靈敏</span>
      </div>
      <button id="startBtn">開始遊戲</button>
      <button id="retryBtn" hidden>再玩1次</button>
    </div>

    <pre id="debug" hidden>診斷：尚未開始</pre>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
