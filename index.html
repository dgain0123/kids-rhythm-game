<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>幼兒節奏遊戲</title>
  <link rel="stylesheet" href="./css/style.css" />
  <!-- PWA：可離線玩、可加到主畫面 -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#ff5a8a" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="節奏遊戲" />
</head>
<body>
  <canvas id="fxCanvas"></canvas>
  <div id="winBanner" hidden>🎉 太棒了！🎉</div>
  <div id="app">
    <h1 id="title">幼兒節奏遊戲</h1>
    <p id="hint">看到音符，打1下鼓！</p>

    <div id="levelMenu" hidden>
      <h2 class="menu-title">選擇關卡 🥁</h2>
      <div id="levelList"></div>
    </div>

    <div id="charPicker" class="char-picker"></div>

    <div id="stage" class="stage">
      <canvas id="noteCanvas" width="560" height="160"></canvas>
      <div id="face"></div>
      <div id="status">按「開始遊戲」，然後打1下鼓</div>
      <div class="meter">
        <div id="meterFill"></div>
        <div id="threshMark" title="打鼓超過這條線就會觸發"></div>
      </div>
      <div class="stage-btns">
        <button id="retryBtn" hidden>再玩1次</button>
        <button id="nextBtn" hidden>下一關 →</button>
      </div>
    </div>

    <div class="controls">
      <div class="sens-row">
        <span>不靈敏</span>
        <input id="sensitivity" type="range" min="0" max="1" step="0.01" value="0" />
        <span>很靈敏</span>
      </div>
      <button id="startBtn">開始遊戲</button>
      <div class="mini-row">
        <button id="menuBtn" type="button" class="mini-btn">☰ 選關</button>
        <button id="reconnectBtn" type="button" class="mini-btn">🎤 重連麥克風</button>
        <button id="testCheerBtn" type="button" class="mini-btn">🔊 試聽歡呼</button>
      </div>
    </div>

    <pre id="debug" hidden>診斷：尚未開始</pre>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
